<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-4">

            <h1 class="text-center mb-4">Lista de Tareas 📝</h1>

            <p class="text-center text-muted">
                Agrega, elimina y marca tus tareas como completadas
            </p>

            <div class="row g-2 mb-4">

                <div class="col-md-7">
                    <div class="input-group">
                        <input type="text" id="inputTarea" class="form-control" placeholder="Ingresa una tarea">

                        <button id="btnAgregar" class="btn btn-primary">
                            Agregar Tarea
                        </button>
                    </div>
                </div>

                <div class="col-md-5">
                    <div class="buscador">
                        <input type="text" id="inputBuscar" class="form-control" placeholder="Filtra tus tareas">
                        <i class="bi bi-search"></i>
                    </div>
                </div>

            </div>

            <ul id="listaTareas" class="list-group">

            </ul>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
